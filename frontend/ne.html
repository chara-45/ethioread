<!DOCTYPE html>
<html>
<head>
  <title>Book AI 📚</title>
</head>
<body>

<h2>Book Assistant 📚</h2>

<input type="text" id="input" placeholder="Ask about books..." />
<button onclick="askAI()">Ask</button>

<p id="result">Answer will appear here...</p>

<script>
async function askAI() {
  const input = document.getElementById("input").value;

  const response = await fetch(
    "https://api.allorigins.win/raw?url=https://api.openai.com/v1/chat/completions",
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer YOUR_API_KEY",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "system", content: "You are a helpful bookstore assistant" },
          { role: "user", content: input }
        ]
      })
    }
  );

  const data = await response.json();

  document.getElementById("result").innerText =
    data.choices[0].message.content;
}
</script>

</body>
</html>
